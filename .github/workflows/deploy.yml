name: Build & Deploy to Hostinger

# ملاحظة: هذا الملف يستخدم بروتوكول SFTP على المنفذ 65002
# يجب استخدام بيانات SSH (اسم المستخدم وكلمة مرور SSH) وليس FTP العادي.
# تم تحديث إعدادات Secrets بنجاح وتفعيل الـ SSH.

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy via SFTP
    runs-on: ubuntu-latest
    env:
      DEPLOY_PORT: ${{ secrets.FTP_PORT || '22' }}

    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Project
        run: npm run build

      - name: Skip large profile PDF in deploy
        run: rm -f dist/company-profile.pdf

      - name: Deploy files via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        timeout-minutes: 10
        with:
          username: ${{ secrets.FTP_USERNAME }}
          server: ${{ secrets.FTP_SERVER }}
          port: ${{ env.DEPLOY_PORT }}
          password: ${{ secrets.FTP_PASSWORD }}
          local_path: './dist/*'
          remote_path: 'public_html'
          sftp_only: true
