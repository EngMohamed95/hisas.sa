name: Build & Deploy to Hostinger

# ملاحظة: هذا الملف يستخدم بروتوكول SFTP على المنفذ 65002
# يجب استخدام بيانات SSH (اسم المستخدم وكلمة مرور SSH) وليس FTP العادي.
# تم تحديث إعدادات Secrets بنجاح وتفعيل الـ SSH.

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Project
        run: npm run build

      - name: Skip large profile PDF in deploy
        run: rm -f dist/company-profile.pdf

      - name: Deploy files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: './dist/'
          server-dir: 'public_html/'
