<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8A45D" />
      <stop offset="50%" stop-color="#E3CD98" />
      <stop offset="100%" stop-color="#AC8742" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="24" fill="#0F172A" />
  <!-- Monogram Logo -->
  <path d="M30,30 L30,70" stroke="url(#gold-grad)" stroke-width="8" stroke-linecap="round" />
  <path d="M70,30 L70,70" stroke="url(#gold-grad)" stroke-width="8" stroke-linecap="round" />
  <path d="M30,50 L70,50" stroke="url(#gold-grad)" stroke-width="8" stroke-linecap="round" />
  <path d="M30,30 L50,15 L70,30" fill="none" stroke="url(#gold-grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
</svg>
